<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - FreshBasket</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
    
    <!-- Logo / Title -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-green-600">🛒 FreshBasket</h1>
      <p class="text-gray-500 mt-2">Login to your account</p>
    </div>

    <!-- Login Form -->
    <form action="#" method="POST" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Email</label>
        <input
          type="email"
          placeholder="Enter your email"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          required
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">Password</label>
        <input
          type="password"
          placeholder="Enter your password"
          class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          required
        />
      </div>

      <!-- Remember + Forgot -->
      <div class="flex justify-between items-center text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="text-green-600">
          Remember me
        </label>
        <a href="#" class="text-green-600 hover:underline">Forgot Password?</a>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
      >
        Login
      </button>

    </form>

    <!-- Register -->
    <p class="text-center text-gray-600 mt-6">
      Don't have an account?
      <a href="#" class="text-green-600 font-medium hover:underline">
        Sign Up
      </a>
    </p>

  </div>

</body>
</html>
