<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-5xl mx-auto bg-white shadow-lg rounded-lg p-6">
        <h1 class="text-2xl font-bold text-green-600 mb-6">
            User Details
        </h1>

        <table class="w-full border-collapse border border-gray-300">
            <thead class="bg-green-600 text-white">
                <tr>
                    <th class="p-3 border">ID</th>
                    <th class="p-3 border">Name</th>
                    <th class="p-3 border">Email</th>
                    <th class="p-3 border">Phone</th>
                    <th class="p-3 border">City</th>
                    <th class="p-3 border">Registration Date</th>
                    <th class="p-3 border">Status</th>
                </tr>
            </thead>

            <tbody>
                {% for user in users %}

                <tr class="text-center hover:bg-gray-100">
                    <td class="p-3 border">{{ user.id }}</td>
                    <td class="p-3 border">{{ user.full_name }}</td>
                    <td class="p-3 border">{{ user.email }}</td>
                    <td class="p-3 border">{{ user.phone }}</td>
                    <td class="p-3 border">{{ user.city }}</td>
                    <td class="p-3 border">{{ user.created_at }}</td>
                    <td class="p-3 border">{{ user.is_active }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
